<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merci pour votre achat! - Ellie VAI</title>
  <meta name="robots" content="noindex">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 60px 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 0.6s ease-in-out;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    h1 {
      color: #8B5CF6;
      font-size: 32px;
      margin-bottom: 20px;
      font-weight: 700;
    }
    p {
      color: #4B5563;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    strong {
      color: #1F2937;
      font-weight: 600;
    }
    .cta {
      margin-top: 40px;
    }
    .cta a {
      display: inline-block;
      background: #8B5CF6;
      color: white;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    .cta a:hover {
      background: #7C3AED;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }
    .secondary {
      margin-top: 20px;
      font-size: 14px;
      color: #6B7280;
    }
    .secondary a {
      color: #8B5CF6;
      text-decoration: none;
    }
    .secondary a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">✅</div>
    <h1>Paiement confirmé!</h1>
    <p>Votre liste premium sera dans votre boîte mail dans <strong>2 à 5 minutes</strong>.</p>
    <p>N'oubliez pas de vérifier vos spams si vous ne voyez rien.</p>
    
    <div class="cta">
      <a href="https://ellievai.com">← Retour au catalogue</a>
    </div>
    
    <div class="secondary">
      <p>Questions? Contactez-nous à <a href="mailto:contact@ellievai.com">contact@ellievai.com</a></p>
    </div>
  </div>
</body>
</html>
